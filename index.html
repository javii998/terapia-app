<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Rutas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3347;
            --accent: #4f7aff;
            --accent2: #38c77a;
            --warn: #f0a832;
            --danger: #e05c5c;
            --text: #e8eaf0;
            --text2: #8b90a8;
            --text3: #555b75;
            --radius: 8px;
        }

        html, body {
            height: 100%; margin: 0; padding: 0;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            overflow: hidden;
        }

        .app {
            display: flex; flex-direction: column; height: 100vh;
        }

        .header {
            height: 52px; background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px; gap: 10px;
            flex-shrink: 0;
        }
        .header-icon { font-size: 18px; }
        .header h1 { margin: 0; font-size: 15px; font-weight: 600; color: var(--text); }
        .header-sub { font-size: 12px; color: var(--text3); margin-left: auto; font-family: 'DM Mono', monospace; }

        .body {
            display: flex; flex: 1; overflow: hidden;
        }

        /* ── PANEL ── */
        .panel {
            width: 360px; min-width: 360px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .panel-scroll {
            flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
        }
        .panel-scroll::-webkit-scrollbar { width: 4px; }
        .panel-scroll::-webkit-scrollbar-track { background: transparent; }
        .panel-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .block {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
        }

        .block-title {
            font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: var(--text3);
            margin: 0 0 12px 0; display: flex; align-items: center; gap: 6px;
        }
        .block-title .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent); flex-shrink: 0;
        }

        .form-row { margin-bottom: 10px; }
        .form-row label {
            display: block; font-size: 11px; font-weight: 600;
            color: var(--text2); margin-bottom: 4px;
        }
        .form-row input, .form-row textarea {
            width: 100%; padding: 8px 10px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-family: inherit; font-size: 13px;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-row input:focus, .form-row textarea:focus {
            border-color: var(--accent);
        }
        .form-row input::placeholder { color: var(--text3); }
        .form-row input:disabled { opacity: 0.4; cursor: not-allowed; }

        .status-line {
            font-size: 11px; margin-top: 4px;
            padding: 4px 8px; border-radius: 4px;
            background: rgba(79,122,255,0.08);
            color: var(--text2);
        }
        .status-line.ok { background: rgba(56,199,122,0.1); color: var(--accent2); }
        .status-line.warn { background: rgba(240,168,50,0.1); color: var(--warn); }

        .checkbox-row {
            display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2);
        }
        .checkbox-row input[type="checkbox"] {
            width: 14px; height: 14px; accent-color: var(--accent);
        }

        /* Buttons */
        .btn {
            width: 100%; padding: 9px 12px;
            border: none; border-radius: 6px;
            font-family: inherit; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #3d67e8; }
        .btn-success { background: var(--accent2); color: #0a1a12; }
        .btn-success:hover { background: #2fb36c; }
        .btn-dark { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-dark:hover { background: var(--border); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Route button */
        .btn-ruta {
            background: linear-gradient(135deg, var(--accent) 0%, #7c4fff 100%);
            color: white; padding: 12px; font-size: 14px;
        }
        .btn-ruta:hover { opacity: 0.9; }

        /* Stop list */
        .stops-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px 0 16px; margin-top: 4px;
        }
        .stops-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
        .stops-count {
            background: var(--accent); color: white;
            font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px;
            font-family: 'DM Mono', monospace;
        }

        .sitio-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 6px; padding: 10px 12px; margin-bottom: 8px;
            transition: opacity 0.2s;
        }
        .sitio-item.visitado {
            border-left-color: var(--text3);
            opacity: 0.55;
        }
        .sitio-item.en-ruta { border-left-color: var(--accent2); }

        .sitio-num {
            font-size: 10px; font-weight: 700; color: var(--accent);
            font-family: 'DM Mono', monospace; margin-bottom: 3px;
        }
        .sitio-item.visitado .sitio-num { color: var(--text3); }
        .sitio-item.en-ruta .sitio-num { color: var(--accent2); }

        .sitio-nombre { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
        .sitio-dir { font-size: 11px; color: var(--text3); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .sitio-notes {
            width: 100%; padding: 6px 8px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 4px;
            color: var(--text); font-family: inherit; font-size: 11px;
            resize: vertical; min-height: 40px; outline: none;
            margin-bottom: 8px; transition: border-color 0.2s;
        }
        .sitio-notes:focus { border-color: var(--accent); }
        .sitio-notes::placeholder { color: var(--text3); }

        .sitio-actions { display: flex; gap: 6px; }
        .sitio-btn {
            flex: 1; padding: 5px; font-size: 11px; font-weight: 600;
            border: none; border-radius: 4px; cursor: pointer; transition: all 0.2s;
            font-family: inherit;
        }
        .sitio-btn-visit { background: rgba(56,199,122,0.15); color: var(--accent2); }
        .sitio-btn-visit:hover { background: rgba(56,199,122,0.3); }
        .sitio-btn-del { background: rgba(224,92,92,0.15); color: var(--danger); }
        .sitio-btn-del:hover { background: rgba(224,92,92,0.3); }

        /* Loading overlay */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); padding: 10px 20px; border-radius: 8px;
            font-size: 13px; font-weight: 500; z-index: 9999;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; pointer-events: auto; }

        /* Map */
        #map { flex: 1; }

        /* Leaflet popup dark */
        .leaflet-popup-content-wrapper {
            background: var(--surface2) !important;
            color: var(--text) !important;
            border: 1px solid var(--border) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
        }
        .leaflet-popup-tip { background: var(--surface2) !important; }
        .leaflet-popup-content { font-family: 'DM Sans', sans-serif; font-size: 13px; }
        .leaflet-popup-content b { color: var(--accent); }

        /* ── HISTORIAL ── */
        .history-panel {
            width: 300px; min-width: 300px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .history-header {
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .history-title {
            font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: var(--text3);
            display: flex; align-items: center; gap: 6px;
        }
        .history-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); flex-shrink: 0; }
        .history-count {
            background: var(--warn); color: #1a1000;
            font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px;
            font-family: 'DM Mono', monospace;
        }
        .history-scroll {
            flex: 1; overflow-y: auto; padding: 12px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .history-scroll::-webkit-scrollbar { width: 4px; }
        .history-scroll::-webkit-scrollbar-track { background: transparent; }
        .history-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .history-empty {
            text-align: center; color: var(--text3); font-size: 12px; padding: 30px 0;
        }
        .history-item {
            background: var(--surface2); border: 1px solid var(--border);
            border-left: 3px solid var(--warn);
            border-radius: 6px; padding: 10px 12px;
        }
        .history-item-date {
            font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace;
            margin-bottom: 4px;
        }
        .history-item-name {
            font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px;
        }
        .history-item-dir {
            font-size: 11px; color: var(--text3); margin-bottom: 6px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .history-item-notes {
            font-size: 11px; color: var(--text2);
            background: var(--bg); border-radius: 4px;
            padding: 5px 8px; border: 1px solid var(--border);
            white-space: pre-wrap; word-break: break-word;
            font-style: italic;
        }
        .history-item-nonotes {
            font-size: 11px; color: var(--text3); font-style: italic;
        }
        .history-footer {
            padding: 10px 12px; border-top: 1px solid var(--border); flex-shrink: 0;
        }
        .btn-danger-sm {
            width: 100%; padding: 7px; font-size: 11px; font-weight: 600;
            background: rgba(224,92,92,0.12); color: var(--danger);
            border: 1px solid rgba(224,92,92,0.25); border-radius: 6px;
            cursor: pointer; font-family: inherit; transition: all 0.2s;
        }
        .btn-danger-sm:hover { background: rgba(224,92,92,0.25); }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <span class="header-icon">📍</span>
        <h1>Gestor de Rutas</h1>
        <span class="header-sub" id="dist-total"></span>
    </div>
    <div class="body">
        <div class="panel">
            <div class="panel-scroll">

                <!-- Bloque 1: Origen / Destino -->
                <div class="block">
                    <p class="block-title"><span class="dot"></span>Punto de inicio y fin</p>
                    <div class="form-row">
                        <label>ORIGEN</label>
                        <input type="text" id="origen-input" placeholder="Ej: Calle Mayor 10, Alicante">
                        <div class="status-line warn" id="origen-status">⚠ No establecido</div>
                    </div>
                    <div class="form-row" id="grupo-destino">
                        <label>DESTINO FINAL</label>
                        <input type="text" id="destino-input" placeholder="Ej: Av Alfonso El Sabio, Alicante">
                        <div class="status-line warn" id="destino-status">⚠ No establecido</div>
                    </div>
                    <div class="checkbox-row" style="margin-bottom:12px;">
                        <input type="checkbox" id="mismo-destino" onchange="toggleMismoDestino(this.checked)">
                        <label for="mismo-destino">Volver al punto de inicio</label>
                    </div>
                    <button class="btn btn-dark" id="btn-guardar-base" onclick="guardarConfiguracionBase()">
                        Establecer puntos
                    </button>
                </div>

                <!-- Bloque 2: Añadir parada -->
                <div class="block">
                    <p class="block-title"><span class="dot" style="background:var(--accent2)"></span>Añadir parada</p>
                    <div class="form-row">
                        <label>NOMBRE / IDENTIFICADOR</label>
                        <input type="text" id="nombre" placeholder="Ej: Clínica Norte">
                    </div>
                    <div class="form-row">
                        <label>DIRECCIÓN POSTAL</label>
                        <input type="text" id="direccion" placeholder="Ej: Calle Ansaldo 12, Alicante" id="dir-input">
                    </div>
                    <button class="btn btn-primary" id="btn-buscar" onclick="buscarYAgregarDireccion()">
                        + Añadir a la lista
                    </button>
                </div>

                <!-- Botón optimizar -->
                <button class="btn btn-ruta" onclick="calcularRutaEficiente()">
                    ⚡ Optimizar ruta por calles
                </button>

                <!-- Lista paradas -->
                <div class="stops-header">
                    <span class="stops-title">Paradas</span>
                    <span class="stops-count" id="contador">0</span>
                </div>
                <div id="lista-sitios" style="padding: 0 0 8px 0;"></div>

            </div>
        </div>
        <div id="map"></div>

        <!-- Panel historial -->
        <div class="history-panel">
            <div class="history-header">
                <span class="history-title"><span class="dot"></span>Historial visitados</span>
                <span class="history-count" id="hist-count">0</span>
            </div>
            <div class="history-scroll" id="lista-historial">
                <div class="history-empty">Aún no hay sitios visitados</div>
            </div>
            <div class="history-footer">
                <button class="btn-danger-sm" onclick="limpiarHistorial()">🗑 Borrar historial</button>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
    // ─── MAPA ───────────────────────────────────────────────────────────────
    const map = L.map('map').setView([38.3452, -0.4810], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // ─── ESTADO ─────────────────────────────────────────────────────────────
    let baseConfig = { origen: null, destino: null, mismoDestino: false };
    let sitios = [];
    let marcadores = [];
    let capasRuta = [];
    let historial = JSON.parse(localStorage.getItem('gestor-rutas-historial') || '[]');

    function guardarHistorial() {
        localStorage.setItem('gestor-rutas-historial', JSON.stringify(historial));
    }

    function renderizarHistorial() {
        const lista = document.getElementById('lista-historial');
        document.getElementById('hist-count').textContent = historial.length;
        if (historial.length === 0) {
            lista.innerHTML = '<div class="history-empty">Aún no hay sitios visitados</div>';
            return;
        }
        lista.innerHTML = '';
        // Más recientes primero
        [...historial].reverse().forEach(h => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <div class="history-item-date">✓ ${h.fecha}</div>
                <div class="history-item-name">${h.nombre}</div>
                <div class="history-item-dir" title="${h.direccion}">${h.direccion.split(',').slice(0,3).join(',')}</div>
                ${h.notas
                    ? `<div class="history-item-notes">${h.notas.replace(/</g,'&lt;')}</div>`
                    : `<div class="history-item-nonotes">Sin notas</div>`
                }
            `;
            lista.appendChild(div);
        });
    }

    function agregarAlHistorial(sitio) {
        const fecha = new Date().toLocaleString('es-ES', {
            day: '2-digit', month: '2-digit', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
        // Evitar duplicados: si ya existe una entrada igual (mismo id en sesión), actualiza notas
        const existente = historial.find(h => h.idSesion === sitio.id);
        if (existente) {
            existente.notas = sitio.notas;
            existente.fecha = fecha;
        } else {
            historial.push({
                idSesion: sitio.id,
                nombre: sitio.nombre,
                direccion: sitio.direccion,
                notas: sitio.notas || '',
                fecha
            });
        }
        guardarHistorial();
        renderizarHistorial();
    }

    function limpiarHistorial() {
        if (!confirm('¿Borrar todo el historial de sitios visitados?')) return;
        historial = [];
        guardarHistorial();
        renderizarHistorial();
        toast('Historial borrado');
    }

    // ─── TOAST ──────────────────────────────────────────────────────────────
    let toastTimer;
    function toast(msg, dur = 3000) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), dur);
    }

    // ─── GEOCODIFICACIÓN (fetch con reintentos progresivos) ─────────────────
    async function geocodificarQuery(q) {
        const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`;
        const resp = await fetch(url, { headers: { 'Accept-Language': 'es' } });
        if (!resp.ok) throw new Error('Error de red');
        const data = await resp.json();
        return (data && data.length > 0) ? data[0] : null;
    }

    function simplificarDireccion(texto) {
        // Genera variantes progresivamente más simples para reintentos
        const variantes = [];
        let t = texto.trim();

        // 1. Limpiar número de piso/portal (ej: "4-6" → "4", "3º B" → "")
        variantes.push(t);

        // 2. Eliminar código postal si está incluido
        const sinCP = t.replace(/\b\d{5}\b/g, '').replace(/\s{2,}/g, ' ').trim().replace(/,\s*,/g, ',').replace(/,\s*$/,'');
        if (sinCP !== t) variantes.push(sinCP);

        // 3. Normalizar caracteres valencianos/catalanes comunes
        const normalizado = t
            .replace(/[àáâãä]/g, 'a').replace(/[èéêë]/g, 'e')
            .replace(/[ìíîï]/g, 'i').replace(/[òóôõö]/g, 'o')
            .replace(/[ùúûü]/g, 'u').replace(/ñ/g, 'n').replace(/ç/g, 'c')
            .replace(/[·]/g, ' ');
        if (normalizado !== t) variantes.push(normalizado);

        // 4. Quitar número de portal y guiones (ej: "4-6" → solo la calle y ciudad)
        const sinNumero = t.replace(/,?\s*\d[\d\-\s]*(?=,|$)/, '').trim().replace(/,\s*$/,'');
        if (sinNumero !== t && sinNumero.length > 5) variantes.push(sinNumero);

        // 5. Solo los dos últimos segmentos: "Calle X, Ciudad"
        const partes = t.split(',').map(s => s.trim()).filter(Boolean);
        if (partes.length > 2) variantes.push(partes.slice(-2).join(', '));
        if (partes.length > 1) variantes.push(partes[0] + ', ' + partes[partes.length - 1]);

        // 6. Si el texto contiene "i" como conjunción valenciana "Salvador i Vicente" → quitar
        const sinConjuncion = t.replace(/\b\w+ i \w+\b/g, m => m.split(' i ')[1]);
        if (sinConjuncion !== t) variantes.push(sinConjuncion);

        // Eliminar duplicados manteniendo orden
        return [...new Set(variantes)];
    }

    async function geocodificar(texto) {
        const variantes = simplificarDireccion(texto);
        for (const q of variantes) {
            if (!q || q.length < 4) continue;
            try {
                const res = await geocodificarQuery(q);
                if (res) {
                    return {
                        direccion: res.display_name,
                        lat: parseFloat(res.lat),
                        lng: parseFloat(res.lon)
                    };
                }
            } catch(e) {
                throw e; // propagar errores de red
            }
            // pequeña pausa para respetar rate-limit de Nominatim
            await new Promise(r => setTimeout(r, 300));
        }
        return null; // ninguna variante funcionó
    }

    // ─── ROUTING REAL POR CALLES (OSRM) ─────────────────────────────────────
    async function obtenerRutaOSRM(puntos) {
        // puntos = [{lat,lng}, ...]
        if (puntos.length < 2) return null;
        const coords = puntos.map(p => `${p.lng},${p.lat}`).join(';');
        const url = `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`;
        try {
            const resp = await fetch(url);
            if (!resp.ok) return null;
            const data = await resp.json();
            if (data.code !== 'Ok' || !data.routes.length) return null;
            const route = data.routes[0];
            return {
                geojson: route.geometry,
                distancia: route.distance,   // metros
                duracion: route.duration      // segundos
            };
        } catch (e) {
            return null;
        }
    }

    // ─── TOGGLE DESTINO ──────────────────────────────────────────────────────
    function toggleMismoDestino(checked) {
        const input = document.getElementById('destino-input');
        const grupo = document.getElementById('grupo-destino');
        if (checked) {
            input.disabled = true;
            input.value = '';
            input.placeholder = 'Volverá al origen automáticamente';
        } else {
            input.disabled = false;
            input.placeholder = 'Ej: Av Alfonso El Sabio, Alicante';
        }
    }

    // ─── GUARDAR BASE ────────────────────────────────────────────────────────
    async function guardarConfiguracionBase() {
        const origenTxt = document.getElementById('origen-input').value.trim();
        const destinoTxt = document.getElementById('destino-input').value.trim();
        const esMismoDestino = document.getElementById('mismo-destino').checked;
        const boton = document.getElementById('btn-guardar-base');

        if (!origenTxt && !baseConfig.origen) {
            toast('⚠ Introduce un punto de partida.');
            return;
        }

        boton.disabled = true;
        boton.textContent = 'Buscando…';

        try {
            if (origenTxt) {
                const res = await geocodificar(origenTxt);
                if (!res) { toast('No se encontró el origen. Detalla más la dirección.'); return; }
                baseConfig.origen = { nombre: 'Origen', ...res };
            }

            if (esMismoDestino) {
                baseConfig.destino = { ...baseConfig.origen, nombre: 'Retorno' };
            } else if (destinoTxt) {
                const res = await geocodificar(destinoTxt);
                if (!res) { toast('No se encontró el destino. Detalla más la dirección.'); return; }
                baseConfig.destino = { nombre: 'Destino', ...res };
            }

            baseConfig.mismoDestino = esMismoDestino;
            actualizarInterfazBaseUI();
            await actualizarMapa();
            document.getElementById('origen-input').value = '';
            document.getElementById('destino-input').value = '';
            toast('✓ Puntos establecidos');
        } catch (e) {
            toast('Error de conexión. Comprueba tu red.');
        } finally {
            boton.disabled = false;
            boton.textContent = 'Establecer puntos';
        }
    }

    function actualizarInterfazBaseUI() {
        const origenDiv = document.getElementById('origen-status');
        const destinoDiv = document.getElementById('destino-status');

        if (baseConfig.origen) {
            origenDiv.className = 'status-line ok';
            origenDiv.textContent = '📍 ' + baseConfig.origen.direccion.split(',').slice(0, 2).join(',');
        } else {
            origenDiv.className = 'status-line warn';
            origenDiv.textContent = '⚠ No establecido';
        }

        if (baseConfig.destino) {
            destinoDiv.className = 'status-line ok';
            destinoDiv.textContent = baseConfig.mismoDestino
                ? '🔄 Volviendo al inicio'
                : '🏁 ' + baseConfig.destino.direccion.split(',').slice(0, 2).join(',');
        } else {
            destinoDiv.className = 'status-line warn';
            destinoDiv.textContent = '⚠ No establecido';
        }
    }

    // ─── AÑADIR PARADA ────────────────────────────────────────────────────────
    async function buscarYAgregarDireccion() {
        const nombre = document.getElementById('nombre').value.trim();
        const direccion = document.getElementById('direccion').value.trim();
        const boton = document.getElementById('btn-buscar');

        if (!nombre || !direccion) {
            toast('Rellena el nombre y la dirección.');
            return;
        }

        boton.disabled = true;
        boton.textContent = 'Buscando…';

        try {
            const res = await geocodificar(direccion);
            if (!res) {
                toast('No se encontró: "' + direccion + '". Detalla más la dirección.');
                return;
            }

            sitios.push({
                id: Date.now(),
                nombre,
                direccion: res.direccion,
                lat: res.lat,
                lng: res.lng,
                visitado: false,
                notas: '',
                orden: sitios.length + 1
            });

            document.getElementById('nombre').value = '';
            document.getElementById('direccion').value = '';
            renderizarLista();
            await actualizarMapa();
            toast('✓ Parada añadida');
        } catch (e) {
            toast('Error de conexión. Comprueba tu red.');
        } finally {
            boton.disabled = false;
            boton.textContent = '+ Añadir a la lista';
        }
    }

    // ─── OPTIMIZAR RUTA (vecino más cercano) ────────────────────────────────
    async function calcularRutaEficiente() {
        if (!baseConfig.origen || !baseConfig.destino) {
            toast('Primero establece los puntos de inicio y fin.');
            return;
        }
        if (sitios.length < 1) {
            toast('Añade al menos una parada para optimizar.');
            return;
        }

        let noVisitados = [...sitios];
        let rutaOptimizada = [];
        let puntoActual = baseConfig.origen;

        while (noVisitados.length > 0) {
            let idx = 0;
            let minDist = calcularDistancia(puntoActual.lat, puntoActual.lng, noVisitados[0].lat, noVisitados[0].lng);
            for (let i = 1; i < noVisitados.length; i++) {
                const d = calcularDistancia(puntoActual.lat, puntoActual.lng, noVisitados[i].lat, noVisitados[i].lng);
                if (d < minDist) { minDist = d; idx = i; }
            }
            puntoActual = noVisitados.splice(idx, 1)[0];
            rutaOptimizada.push(puntoActual);
        }

        rutaOptimizada.forEach((s, i) => { s.orden = i + 1; s.enRuta = true; });
        sitios = rutaOptimizada;
        renderizarLista();
        await actualizarMapa();
        toast('✓ Ruta optimizada');
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ─── MAPA ─────────────────────────────────────────────────────────────────
    async function actualizarMapa() {
        // Limpiar capas anteriores
        marcadores.forEach(m => map.removeLayer(m));
        marcadores = [];
        capasRuta.forEach(c => map.removeLayer(c));
        capasRuta = [];

        const todosLosPuntos = [];

        function pinMarker(lat, lng, html, popup) {
            const m = L.marker([lat, lng], {
                icon: L.divIcon({ html, className: 'c-pin', iconSize: [22, 22], iconAnchor: [11, 11] })
            }).bindPopup(popup).addTo(map);
            marcadores.push(m);
            todosLosPuntos.push([lat, lng]);
        }

        // Origen
        if (baseConfig.origen) {
            pinMarker(baseConfig.origen.lat, baseConfig.origen.lng,
                `<div style="background:#f0a832;width:22px;height:22px;border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:bold;box-shadow:0 2px 6px rgba(0,0,0,.5)">▶</div>`,
                `<b>SALIDA</b><br>${baseConfig.origen.direccion.split(',').slice(0, 2).join(',')}`
            );
        }

        // Paradas intermedias
        sitios.sort((a, b) => a.orden - b.orden);
        sitios.forEach((s, i) => {
            const col = s.visitado ? '#555b75' : '#4f7aff';
            pinMarker(s.lat, s.lng,
                `<div style="background:${col};width:22px;height:22px;border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;color:white;font-size:10px;font-weight:bold;box-shadow:0 2px 6px rgba(0,0,0,.5)">${i + 1}</div>`,
                `<b>Parada ${i + 1}: ${s.nombre}</b><br>${s.direccion.split(',').slice(0, 2).join(',')}`
            );
        });

        // Destino (si es diferente al origen)
        if (baseConfig.destino && !baseConfig.mismoDestino) {
            pinMarker(baseConfig.destino.lat, baseConfig.destino.lng,
                `<div style="background:#9b59b6;width:22px;height:22px;border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:bold;box-shadow:0 2px 6px rgba(0,0,0,.5)">■</div>`,
                `<b>LLEGADA</b><br>${baseConfig.destino.direccion.split(',').slice(0, 2).join(',')}`
            );
        }

        // Dibujar ruta por calles reales si hay suficientes puntos
        const secuencia = [];
        if (baseConfig.origen) secuencia.push(baseConfig.origen);
        sitios.forEach(s => secuencia.push(s));
        if (baseConfig.destino) secuencia.push(baseConfig.destino);

        if (secuencia.length >= 2) {
            const ruta = await obtenerRutaOSRM(secuencia);
            if (ruta) {
                const layer = L.geoJSON(ruta.geojson, {
                    style: { color: '#4f7aff', weight: 4, opacity: 0.85 }
                }).addTo(map);
                capasRuta.push(layer);

                // Mostrar distancia y tiempo estimado
                const km = (ruta.distancia / 1000).toFixed(1);
                const min = Math.round(ruta.duracion / 60);
                document.getElementById('dist-total').textContent = `${km} km · ~${min} min`;
                map.fitBounds(layer.getBounds(), { padding: [40, 40] });
            } else {
                // Fallback: línea recta si OSRM falla
                const coords = secuencia.map(p => [p.lat, p.lng]);
                const layer = L.polyline(coords, { color: '#4f7aff', weight: 3, opacity: 0.6, dashArray: '8,6' }).addTo(map);
                capasRuta.push(layer);
                map.fitBounds(layer.getBounds(), { padding: [40, 40] });
                document.getElementById('dist-total').textContent = '';
            }
        } else if (todosLosPuntos.length > 0) {
            map.setView(todosLosPuntos[0], 14);
        }
    }

    // ─── LISTA ────────────────────────────────────────────────────────────────
    function renderizarLista() {
        const lista = document.getElementById('lista-sitios');
        document.getElementById('contador').textContent = sitios.length;
        lista.innerHTML = '';
        sitios.sort((a, b) => a.orden - b.orden);

        if (sitios.length === 0) {
            lista.innerHTML = `<div style="text-align:center;color:var(--text3);font-size:12px;padding:20px 0;">Sin paradas aún</div>`;
            return;
        }

        sitios.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `sitio-item${s.visitado ? ' visitado' : ''}${s.enRuta ? ' en-ruta' : ''}`;
            div.innerHTML = `
                <div class="sitio-num">PARADA ${i + 1}</div>
                <div class="sitio-nombre">${s.nombre}</div>
                <div class="sitio-dir" title="${s.direccion}">${s.direccion.split(',').slice(0,3).join(',')}</div>
                <textarea class="sitio-notes" placeholder="Notas, feedback…" onchange="guardarNotas(${s.id}, this.value)">${s.notas || ''}</textarea>
                <div class="sitio-actions">
                    <button class="sitio-btn sitio-btn-visit" onclick="toggleVisitado(${s.id})">
                        ${s.visitado ? '↩ Pendiente' : '✓ Visitado'}
                    </button>
                    <button class="sitio-btn sitio-btn-del" onclick="eliminarSitio(${s.id})">Eliminar</button>
                </div>
            `;
            lista.appendChild(div);
        });
    }

    // ─── ACCIONES PARADAS ────────────────────────────────────────────────────
    function toggleVisitado(id) {
        const s = sitios.find(x => x.id === id);
        if (s) {
            s.visitado = !s.visitado;
            if (s.visitado) {
                agregarAlHistorial(s);
            }
        }
        renderizarLista();
        actualizarMapa();
    }

    function guardarNotas(id, texto) {
        const s = sitios.find(x => x.id === id);
        if (s) {
            s.notas = texto;
            // Si ya estaba visitado, actualiza las notas en el historial
            if (s.visitado) {
                const existente = historial.find(h => h.idSesion === id);
                if (existente) {
                    existente.notas = texto;
                    guardarHistorial();
                    renderizarHistorial();
                }
            }
        }
    }

    async function eliminarSitio(id) {
        if (!confirm('¿Eliminar esta parada?')) return;
        sitios = sitios.filter(s => s.id !== id);
        sitios.forEach((s, i) => s.orden = i + 1);
        renderizarLista();
        await actualizarMapa();
    }

    // ─── ATAJOS ────────────────────────────────────────────────────────────────
    document.getElementById('direccion').addEventListener('keypress', e => {
        if (e.key === 'Enter') buscarYAgregarDireccion();
    });
    document.getElementById('nombre').addEventListener('keypress', e => {
        if (e.key === 'Enter') document.getElementById('direccion').focus();
    });

    // Init
    actualizarInterfazBaseUI();
    renderizarLista();
    renderizarHistorial();
</script>
</body>
